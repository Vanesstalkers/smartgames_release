<!doctype html>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="<%= BASE_URL %>favicon.ico" />
    <title>SmartGames.Studio</title>
    <style>
      html,
      body {
        height: 100%;
      }

      html {
        position: relative;
        background-color: #10131a;
      }

      html::before,
      html::after {
        content: '';
        position: fixed;
        inset: 0;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        pointer-events: none;
        z-index: -1;
      }

      html::before {
        background-image: url('./bg-lobby-lqip.png');
        filter: grayscale(1) opacity(0.2);
      }

      html::after {
        background-image: url('./bg-lobby.png');
        filter: grayscale(1);
        opacity: 0;
        transition: opacity 360ms ease-in-out;
      }

      html.bg-ready::after {
        opacity: 1;
      }

      body {
        font-family: 'Conv_segoeuil';
        font-size: 13px;
        overflow: hidden;
        position: relative;
        width: 100%;
        margin: 0px;
      }
    </style>

    <script>
      (function preloadBackground() {
        var image = new Image();
        image.src = './bg.png';
        image.onload = function onBackgroundLoaded() {
